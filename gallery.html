<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:linear-gradient(to right,#141e30,#243b55);
    color:white;
    min-height:100vh;
    overflow-x:hidden;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(10px);
    position:sticky;
    top:0;
    z-index:1000;
}

.left{
    font-size:20px;
    font-weight:bold;
}

/* LINKS (DESKTOP) */
.links{
    display:flex;
    gap:10px;
    align-items:center;
}

/* BUTTONS */
.nav-btn{
    background:#1f2937;
    color:white;
    padding:10px 14px;
    border-radius:8px;
    text-decoration:none;
    font-size:14px;
}

.logout-btn{
    background:#ff4b5c;
    border:none;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
}

/* HAMBURGER */
.hamburger{
    display:none;
    font-size:26px;
    cursor:pointer;
}

/* CLOSE BUTTON (NEW) */
.close-btn{
    display:none;
    font-size:26px;
    cursor:pointer;
    position:absolute;
    top:15px;
    right:20px;
}

/* TITLE */
.page-title{
    text-align:center;
    padding:30px 15px 10px;
}

.page-title h1{
    font-size:28px;
}

.page-title p{
    color:#cbd5e1;
    font-size:14px;
}

/* GRID */
#gallery{
    max-width:1200px;
    margin:auto;
    padding:20px;

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:white;
    color:black;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    display:block;
}

.card-content{
    padding:12px;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:12px;
}

/* BUTTONS */
.edit-btn,
.delete-btn{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
}

.edit-btn{
    background:#2563eb;
    color:white;
}

.delete-btn{
    background:#ef4444;
    color:white;
}

/* ================= MOBILE ================= */
@media(max-width:768px){

    .hamburger{
        display:block;
    }

    .links{
        position:fixed;
        top:0;
        right:-100%;
        width:75%;
        height:100vh;
        background:#111827;
        flex-direction:column;
        padding:70px 20px;
        transition:0.3s;
        z-index:2000;
        gap:15px;
    }

    .links.show{
        right:0;
    }

    .close-btn{
        display:block;
    }

    .nav-btn, .logout-btn{
        width:100%;
        text-align:center;
        padding:14px;
        font-size:16px;
    }

    .page-title h1{
        font-size:22px;
    }
}
</style>
</head>

<body>

<div class="navbar">
    <div class="left">📸 Admin Panel</div>

    <div class="hamburger" onclick="toggleMenu()">☰</div>

    <div class="links" id="menu">

        <!-- CLOSE BUTTON ADDED -->
        <div class="close-btn" onclick="toggleMenu()">✖</div>

        <a class="nav-btn" href="./gallery.html">Manage Photos</a>
        <a class="nav-btn" href="./create-quote.html">Manage Quotes</a>
        <button class="logout-btn" onclick="logout()">Logout</button>

    </div>
</div>

<div class="page-title">
    <h1>📸 Uploaded Photos</h1>
    <p>Manage captured images safely</p>
</div>

<div id="gallery"></div>

<script src="./config.js"></script>

<script>

const API_URL = window.API_CONFIG.API_URL;
const token = localStorage.getItem("token");

if(!token){
    window.location.href="./admin.html";
}

function toggleMenu(){
    document.getElementById("menu").classList.toggle("show");
}

function logout(){
    localStorage.removeItem("token");
    window.location.href="./admin.html";
}

async function loadPhotos(){

    const res = await fetch(`${API_URL}/photos`, {
        headers:{ Authorization:"Bearer "+token }
    });

    const data = await res.json();

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    data.forEach(photo=>{

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img src="${photo.image}" />
            <div class="card-content">
                <h3>${photo.title || "No title"}</h3>
                <p>${photo.description || ""}</p>

                <div class="actions">
                    <button class="edit-btn"
                        onclick="editPhoto('${photo._id}','${photo.title || ""}','${photo.description || ""}')">
                        Edit
                    </button>

                    <button class="delete-btn"
                        onclick="deletePhoto('${photo._id}')">
                        Delete
                    </button>
                </div>
            </div>
        `;

        gallery.appendChild(div);
    });
}

/* EDIT */
window.editPhoto = async function(id, oldTitle, oldDesc){

    let title = prompt("Edit title", oldTitle);
    if(title === null) return;

    let description = prompt("Edit description", oldDesc);
    if(description === null) return;

    if(title.trim() === "") title = oldTitle;
    if(description.trim() === "") description = oldDesc;

    await fetch(`${API_URL}/photo/${id}`, {
        method:"PUT",
        headers:{
            "Content-Type":"application/json",
            Authorization:"Bearer "+token
        },
        body:JSON.stringify({ title, description })
    });

    loadPhotos();
}

/* DELETE */
window.deletePhoto = async function(id){

    if(!confirm("Delete this photo?")) return;

    await fetch(`${API_URL}/photo/${id}`, {
        method:"DELETE",
        headers:{ Authorization:"Bearer "+token }
    });

    loadPhotos();
}

loadPhotos();

</script>

</body>
</html>
