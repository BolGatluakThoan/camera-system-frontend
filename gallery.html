<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:linear-gradient(to right,#141e30,#243b55);
    color:white;
    min-height:100vh;
    overflow-x:hidden;
}

/* NAVBAR */
.navbar{
    position:sticky;
    top:0;
    z-index:1000;

    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 16px;

    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);

    flex-wrap:wrap;
    gap:10px;
}

/* TITLE */
.left{
    font-size:18px;
    font-weight:bold;
}

/* LINKS */
.links{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}

.nav-btn{
    background:#1f2937;
    color:white;
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
    font-size:13px;
}

.logout-btn{
    background:#ff4b5c;
    border:none;
    color:white;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

/* PAGE TITLE */
.page-title{
    text-align:center;
    padding:25px 15px 10px;
}

.page-title h1{
    font-size:24px;
}

.page-title p{
    font-size:14px;
    color:#cbd5e1;
    margin-top:5px;
}

/* GALLERY */
#gallery{
    max-width:1200px;
    margin:auto;
    padding:15px;

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:15px;
}

/* CARD */
.card{
    background:white;
    color:black;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
    display:flex;
    flex-direction:column;
}

/* IMAGE */
.card img{
    width:100%;
    height:auto;
    max-height:400px;
    object-fit:contain;
    background:#f3f4f6;
    cursor:pointer;
    display:block;
}

/* CONTENT */
.card-content{
    padding:12px;
}

/* BUTTONS */
.actions{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.edit-btn,
.delete-btn{
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
}

.edit-btn{
    background:#2563eb;
    color:white;
}

.delete-btn{
    background:#ef4444;
    color:white;
}

/* FULLSCREEN IMAGE VIEWER */
.image-modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
    padding:20px;
}

.image-modal.active{
    display:flex;
}

.image-modal img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
}

.close-modal{
    position:absolute;
    top:20px;
    right:25px;
    font-size:40px;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

/* MOBILE */
@media(max-width:600px){

    .navbar{
        justify-content:center;
        text-align:center;
    }

    .left{
        width:100%;
    }

    .links{
        justify-content:center;
        width:100%;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="left">📸 Admin Panel</div>

    <div class="links">
        <a class="nav-btn" href="./gallery.html">Photos</a>
        <a class="nav-btn" href="./create-quote.html">Quotes</a>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="page-title">
    <h1>📸 Uploaded Photos</h1>
    <p>Manage captured images safely</p>
</div>

<div id="gallery"></div>

<!-- FULLSCREEN MODAL -->
<div class="image-modal" id="imageModal">
    <span class="close-modal" id="closeModal">&times;</span>
    <img id="modalImg" src="">
</div>

<script src="./config.js"></script>

<script>

const API_URL = window.API_CONFIG.API_URL;
const token = localStorage.getItem("token");

if(!token){
    window.location.href="./admin.html";
}

function logout(){
    localStorage.removeItem("token");
    window.location.href="./admin.html";
}

async function loadPhotos(){

    const res = await fetch(`${API_URL}/photos`, {
        headers:{ Authorization:"Bearer "+token }
    });

    const data = await res.json();

    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    data.forEach(photo=>{

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <img 
                src="${photo.image}" 
                onclick="openImage('${photo.image}')"
            />

            <div class="card-content">
                <h3>${photo.title || "No title"}</h3>
                <p>${photo.description || ""}</p>

                <div class="actions">
                    <button class="edit-btn"
                        onclick="editPhoto('${photo._id}','${photo.title || ""}','${photo.description || ""}')">
                        Edit
                    </button>

                    <button class="delete-btn"
                        onclick="deletePhoto('${photo._id}')">
                        Delete
                    </button>
                </div>
            </div>
        `;

        gallery.appendChild(div);
    });
}

window.editPhoto = async function(id, oldTitle, oldDesc){

    let title = prompt("Edit title", oldTitle);
    if(title === null) return;

    let description = prompt("Edit description", oldDesc);
    if(description === null) return;

    if(title.trim() === "") title = oldTitle;
    if(description.trim() === "") description = oldDesc;

    await fetch(`${API_URL}/photo/${id}`, {
        method:"PUT",
        headers:{
            "Content-Type":"application/json",
            Authorization:"Bearer "+token
        },
        body:JSON.stringify({ title, description })
    });

    loadPhotos();
}

window.deletePhoto = async function(id){

    if(!confirm("Delete this photo?")) return;

    await fetch(`${API_URL}/photo/${id}`, {
        method:"DELETE",
        headers:{ Authorization:"Bearer "+token }
    });

    loadPhotos();
}

/* FULLSCREEN IMAGE */
const imageModal = document.getElementById("imageModal");
const modalImg = document.getElementById("modalImg");
const closeModal = document.getElementById("closeModal");

window.openImage = function(src){
    modalImg.src = src;
    imageModal.classList.add("active");
}

closeModal.onclick = function(){
    imageModal.classList.remove("active");
}

imageModal.onclick = function(e){
    if(e.target === imageModal){
        imageModal.classList.remove("active");
    }
}

loadPhotos();

</script>

</body>
</html>
