<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Quotes</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(to right,#141e30,#243b55);
    color:white;
    min-height:100vh;
}

/* NAVBAR */
.navbar{
    width:100%;
    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(10px);
    padding:15px 25px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    font-size:22px;
    font-weight:bold;
}

/* BUTTONS */
.nav-buttons{
    display:flex;
    gap:10px;
}

.nav-btn{
    border:none;
    cursor:pointer;
    padding:10px 16px;
    border-radius:8px;
    color:white;
}

.back-btn{ background:#10b981; }
.logout-btn{ background:#ef4444; }

/* CONTAINER */
.container{
    max-width:1200px;
    margin:auto;
    padding:30px 20px;
}

/* FORM */
.form-box{
    background:white;
    color:black;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:15px;
}

/* GRID */
.quote-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:white;
    color:black;
    border-radius:12px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

/* BUTTONS */
.actions{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.edit-btn, .delete-btn{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
}

.edit-btn{ background:#2563eb; }
.delete-btn{ background:#ef4444; }

.empty{
    text-align:center;
    margin-top:40px;
    opacity:0.7;
}

</style>
</head>

<body>

<div class="navbar">
    <div class="logo">✍️ Manage Quotes</div>

    <div class="nav-buttons">
        <button class="nav-btn back-btn" onclick="goBack()">Back</button>
        <button class="nav-btn logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="container">

    <div class="form-box">
        <h2>Create Quote</h2>

        <input id="person" placeholder="Person Name">
        <input id="image" placeholder="Image URL">
        <textarea id="quote" placeholder="Quote"></textarea>

        <button onclick="createQuote()">Publish</button>
    </div>

    <div id="quotes" class="quote-grid"></div>

</div>

<script src="./config.js"></script>

<script>

const API_URL = window.API_CONFIG.API_URL;  // ✅ FIXED
const token = localStorage.getItem("token");

if(!token){
    window.location.href="./admin.html";
}

function goBack(){
    window.location.href="./gallery.html";
}

function logout(){
    localStorage.removeItem("token");
    window.location.href="./admin.html";
}

/* LOAD QUOTES */
async function loadQuotes(){

    try{

        const res = await fetch(`${API_URL}/quote`);

        if(!res.ok){
            throw new Error("HTTP " + res.status);
        }

        const data = await res.json();

        const box = document.getElementById("quotes");
        box.innerHTML = "";

        if(!Array.isArray(data) || data.length === 0){
            box.innerHTML = `<div class="empty">No quotes available</div>`;
            return;
        }

        data.forEach(q=>{

            const div = document.createElement("div");
            div.className="card";

            div.innerHTML=`
                <img src="${q.image}">
                <div class="card-content">
                    <h3>${q.person || "Unknown"}</h3>
                    <p>${q.text || ""}</p>

                    <div class="actions">
                        <button class="edit-btn"
                        onclick="editQuote('${q._id}')">Edit</button>

                        <button class="delete-btn"
                        onclick="deleteQuote('${q._id}')">Delete</button>
                    </div>
                </div>
            `;

            box.appendChild(div);
        });

    }catch(err){
        console.log(err);
        document.getElementById("quotes").innerHTML =
        `<div class="empty">Failed to load quotes (check API)</div>`;
    }
}

/* CREATE */
async function createQuote(){

    const person = document.getElementById("person").value;
    const image = document.getElementById("image").value;
    const quote = document.getElementById("quote").value;

    await fetch(`${API_URL}/quote`,{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+token
        },
        body:JSON.stringify({
            person,
            text:quote,
            image
        })
    });

    loadQuotes();
}

/* DELETE */
async function deleteQuote(id){

    if(!confirm("Delete?")) return;

    await fetch(`${API_URL}/quote/${id}`,{
        method:"DELETE",
        headers:{
            "Authorization":"Bearer "+token
        }
    });

    loadQuotes();
}

/* EDIT (simple prompt version) */
async function editQuote(id){

    const person = prompt("Edit person");
    const text = prompt("Edit quote");
    const image = prompt("Edit image URL");

    if(!person || !text || !image) return;

    await fetch(`${API_URL}/quote/${id}`,{
        method:"PUT",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+token
        },
        body:JSON.stringify({ person, text, image })
    });

    loadQuotes();
}

loadQuotes();

</script>

</body>
</html>
